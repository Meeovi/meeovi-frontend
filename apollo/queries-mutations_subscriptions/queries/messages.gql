query messages($filter: messages_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String){
    messages(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search){
        id
        sort
        user_created
        date_created
        user_updated
        date_updated
        title
        content
    }
}