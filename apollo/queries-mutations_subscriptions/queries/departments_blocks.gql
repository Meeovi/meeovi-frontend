query departments_blocks($filter: departments_blocks_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String){
    departments_blocks(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search){
        id
        item{
            __typename
            ... on block_cardgroup {
                id
                headline
                content
                group_type
                cards
            }
            ... on block_hero {
                id
                headline
                content
                buttons
            }
            ... on block_icon {
                id
                title
            }
            ... on block_image_carousel {
                id
                title
                text
                url
            }
            ... on block_richtext {
                id
                headline
                content
            }
            ... on blocks_banner {
                id
                title
                text
                buttons
            }
            ... on blocks_feature_card {
                id
                title
                subtitle
                content
            }
            ... on blocks_image_card {
                id
                title
                content
            }
            ... on blocks_products_deals {
                id
                sort
                user_created
                date_created
                headline
                content
                products_card_type
            }
            ... on blocks_products_slider {
                id
                title
            }
        }
        collection
    }
}