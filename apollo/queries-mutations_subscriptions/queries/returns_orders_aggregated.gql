query returns_orders_aggregated($groupBy: [String], $filter: returns_orders_filter, $limit: Int, $offset: Int, $page: Int, $search: String, $sort: [String]){
    returns_orders_aggregated(groupBy: $groupBy, filter: $filter, limit: $limit, offset: $offset, page: $page, search: $search, sort: $sort){
        group
        countAll
    }
}