query connections($filter: connections_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String){
    connections(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search){
        id
        date_created
        name
        description
        connection_type
        user_a
        recipient
    }
}