query shops($filter: shops_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String){
    shops(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search){
        id
        status
        sort
        user_created
        date_created
        user_updated
        date_updated
        name
        content
        website
        type
        address
    }
}