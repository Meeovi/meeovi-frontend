query orders($filter: orders_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String){
    orders(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search){
        id
        status
        date_created
        date_updated
        order_number
        total_price
    }
}