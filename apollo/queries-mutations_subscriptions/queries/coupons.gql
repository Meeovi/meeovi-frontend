query coupons($filter: coupons_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String){
    coupons(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search){
        id
        name
        excerpt
        code
        discount_percent
        valid_from
        valid_until
        max_redemptions
    }
}