query countries_by_version($version: String!, $id: ID!){
    countries_by_version(version: $version, id: $id){
        id
        name
        iso3
        iso2
        phonecode
        capital
        currency
        currency_symbol
        tld
        native
        region
        subregion
        timezones
        translations
        latitude
        longitude
        emoji
        emojiU
        created_at
        updated_at
        flag
        wikiDataId
        states
        products
        cities
        currencies
    }
}