query articles($filter: articles_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String){
    articles(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search){
        id
        name
        excerpt
        content
        created_at
        type
        isPublic
        stamp
    }
}