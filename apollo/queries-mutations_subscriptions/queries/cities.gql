query cities($filter: cities_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String){
    cities(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search){
        id
        name
        description
        postalCode
        longitude
        latitude
        languagenames
    }
}