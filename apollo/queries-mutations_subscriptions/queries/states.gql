query states($filter: states_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String){
    states(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search){
        id
        name
        country_code
        fips_code
        iso2
        latitude
        longitude
        flag
        wikiDataId
        country_id
        created_at
        updated_at
    }
}