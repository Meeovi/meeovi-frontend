query pages($filter: pages_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String){
    pages(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search){
        id
        status
        sort
        date_created
        date_updated
        name
        content
        list
        type
        link
        slug
    }
}