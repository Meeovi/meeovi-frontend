query customers($filter: customers_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String){
    customers(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search){
        id
        name_prefix
        first_name
        middle_name
        last_name
        email
        phone
        zipcode
        name_suffix
        tax_vat_number
        description
        username
        password
        payment
        dateofbirth
        gender
        type
        created_at
    }
}