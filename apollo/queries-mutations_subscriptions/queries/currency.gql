query currency($filter: currency_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String){
    currency(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search){
        id
        sort
        date_created
        date_updated
        name
        code
        symbol
    }
}