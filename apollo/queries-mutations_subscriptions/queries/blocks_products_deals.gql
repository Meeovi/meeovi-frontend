query blocks_products_deals($filter: blocks_products_deals_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String){
    blocks_products_deals(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search){
        id
        sort
        user_created
        date_created
        headline
        content
        products_card_type
    }
}