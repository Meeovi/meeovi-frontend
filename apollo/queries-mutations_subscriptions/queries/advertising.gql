query advertising($filter: advertising_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String){
    advertising(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search){
        id
        status
        sort
        date_created
        date_updated
        name
        description
        link
        start_date
        end_time
    }
}