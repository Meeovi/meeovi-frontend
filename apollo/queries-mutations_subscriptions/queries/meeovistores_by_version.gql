query meeovistores_by_version($version: String!, $id: ID!){
    meeovistores_by_version(version: $version, id: $id){
        id
        sort
        user_created
        date_created
        user_updated
        date_updated
        name
        content
        image
        color
        colortext
        categories
        customers
        collections
        products
        websites
        translations
    }
}