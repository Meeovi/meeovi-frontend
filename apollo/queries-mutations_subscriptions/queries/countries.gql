query countries($filter: countries_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String){
    countries(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search){
        id
        name
        iso3
        iso2
        phonecode
        capital
        currency
        currency_symbol
        tld
        native
        region
        subregion
        timezones
        translations
        latitude
        longitude
        emoji
        emojiU
        created_at
        updated_at
        flag
        wikiDataId
    }
}