query products($filter: products_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String){
    products(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search){
        id
        sku
        name
        tax_class
        stock_status
        weight
        created_at
        height
        content
        part_number
        format
        type
        visibility
        price
        size
        rating
        like
        stock
    }
}