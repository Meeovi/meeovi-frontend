query translations($filter: translations_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String){
    translations(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search){
        id
        status
        sort
        date_created
        date_updated
        name
        url
        code
    }
}