query departments($filter: departments_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String){
    departments(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search){
        id
        name
        websites
        description
        content
        color
        colortext
        Active
    }
}