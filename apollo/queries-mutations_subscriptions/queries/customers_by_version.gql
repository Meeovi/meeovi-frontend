query customers_by_version($version: String!, $id: ID!){
    customers_by_version(version: $version, id: $id){
        id
        name_prefix
        first_name
        middle_name
        last_name
        email
        phone
        zipcode
        name_suffix
        tax_vat_number
        description
        username
        password
        payment
        dateofbirth
        image
        gender
        type
        created_at
        avatar
        address
    }
}