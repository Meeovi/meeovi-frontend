query subscriptions($filter: subscriptions_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String){
    subscriptions(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search){
        id
        status
        date_created
        date_updated
        subscription_number
        start_date
        end_date
    }
}