query comments($filter: comments_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String){
    comments(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search){
        id
        response
        name
        created_at
        updated_at
        helpful
        feedback
    }
}