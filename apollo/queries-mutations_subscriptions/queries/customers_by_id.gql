query customers_by_id($id: ID!){
    customers_by_id(id: $id){
        id
        name_prefix
        first_name
        middle_name
        last_name
        email
        phone
        zipcode
        name_suffix
        tax_vat_number
        description
        username
        password
        payment
        dateofbirth
        gender
        type
        created_at
    }
}