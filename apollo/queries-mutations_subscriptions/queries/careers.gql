query careers($filter: careers_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String){
    careers(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search){
        id
        status
        sort
        date_created
        date_updated
        name
        url
        description
        type
        degree_level
        experience
    }
}