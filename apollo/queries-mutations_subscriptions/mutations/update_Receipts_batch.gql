mutation update_Receipts_batch($filter: Receipts_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [update_Receipts_input!]){
    update_Receipts_batch(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        date_created
        total_price
    }
}