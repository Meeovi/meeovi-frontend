mutation update_tags_batch($filter: tags_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [update_tags_input!]){
    update_tags_batch(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        status
        sort
        date_created
        name
        description
    }
}