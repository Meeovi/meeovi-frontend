mutation update_address_items($filter: address_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $ids: [ID]!, $data: update_address_input!){
    update_address_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, ids: $ids, data: $data){
        id
        status
        sort
        user_created
        date_created
        user_updated
        date_updated
        name
        description
        type
        address
    }
}