mutation update_coupons_batch($filter: coupons_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [update_coupons_input!]){
    update_coupons_batch(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        name
        excerpt
        code
        discount_percent
        valid_from
        valid_until
        max_redemptions
    }
}