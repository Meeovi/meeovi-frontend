mutation create_payments_items($filter: payments_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [create_payments_input!]){
    create_payments_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        status
        payment_method
        amount
        transaction_id
    }
}