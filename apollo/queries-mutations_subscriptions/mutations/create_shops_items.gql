mutation create_shops_items($filter: shops_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [create_shops_input!]){
    create_shops_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        status
        sort
        user_created
        date_created
        user_updated
        date_updated
        name
        content
        website
        type
        address
    }
}