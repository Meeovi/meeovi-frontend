mutation update_products_item($id: ID!, $data: update_products_input!){
    update_products_item(id: $id, data: $data){
        id
        sku
        name
        tax_class
        stock_status
        weight
        created_at
        height
        content
        part_number
        format
        type
        visibility
        price
        size
        rating
        like
        stock
    }
}