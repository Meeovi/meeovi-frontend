mutation update_Space_batch($filter: Space_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [update_Space_input!]){
    update_Space_batch(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        status
        sort
        user_created
        date_created
        user_updated
        date_updated
        Name
        Description
    }
}