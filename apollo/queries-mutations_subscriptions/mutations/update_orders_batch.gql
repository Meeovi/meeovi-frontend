mutation update_orders_batch($filter: orders_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [update_orders_input!]){
    update_orders_batch(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        status
        date_created
        date_updated
        order_number
        total_price
    }
}