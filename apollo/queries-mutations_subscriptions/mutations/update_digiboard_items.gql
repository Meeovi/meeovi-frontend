mutation update_digiboard_items($filter: digiboard_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $ids: [ID]!, $data: update_digiboard_input!){
    update_digiboard_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, ids: $ids, data: $data){
        id
        name
        board
        created_at
    }
}