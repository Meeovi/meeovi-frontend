mutation update_cart_items($filter: cart_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $ids: [ID]!, $data: update_cart_input!){
    update_cart_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, ids: $ids, data: $data){
        id
        date_created
        user_updated
        date_updated
        session_id
        total_price
    }
}