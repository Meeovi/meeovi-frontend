mutation create_comments_items($filter: comments_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [create_comments_input!]){
    create_comments_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        response
        name
        created_at
        updated_at
        helpful
        feedback
    }
}