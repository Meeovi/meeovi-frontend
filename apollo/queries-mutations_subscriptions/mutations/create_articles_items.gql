mutation create_articles_items($filter: articles_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [create_articles_input!]){
    create_articles_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        name
        excerpt
        content
        created_at
        type
        isPublic
        stamp
    }
}