mutation create_cart_items($filter: cart_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [create_cart_input!]){
    create_cart_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        date_created
        user_updated
        date_updated
        session_id
        total_price
    }
}