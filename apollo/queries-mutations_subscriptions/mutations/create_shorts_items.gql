mutation create_shorts_items($filter: shorts_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [create_shorts_input!]){
    create_shorts_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        status
        sort
        user_created
        date_created
        user_updated
        date_updated
        name
        description
    }
}