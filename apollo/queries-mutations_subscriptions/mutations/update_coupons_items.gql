mutation update_coupons_items($filter: coupons_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $ids: [ID]!, $data: update_coupons_input!){
    update_coupons_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, ids: $ids, data: $data){
        id
        name
        excerpt
        code
        discount_percent
        valid_from
        valid_until
        max_redemptions
    }
}