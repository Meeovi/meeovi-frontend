mutation update_websites_batch($filter: websites_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [update_websites_input!]){
    update_websites_batch(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        created_at
        name
        url
        type
    }
}