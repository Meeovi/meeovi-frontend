mutation update_brands_batch($filter: brands_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [update_brands_input!]){
    update_brands_batch(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        created_at
        code
        name
        description
        image
    }
}