mutation update_Space_items($filter: Space_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $ids: [ID]!, $data: update_Space_input!){
    update_Space_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, ids: $ids, data: $data){
        id
        status
        sort
        user_created
        date_created
        user_updated
        date_updated
        Name
        Description
    }
}