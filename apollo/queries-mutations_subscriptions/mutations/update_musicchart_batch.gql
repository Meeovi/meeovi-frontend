mutation update_musicchart_batch($filter: musicchart_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [update_musicchart_input!]){
    update_musicchart_batch(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        status
        sort
        user_created
        date_created
        user_updated
        date_updated
        name
        description
    }
}