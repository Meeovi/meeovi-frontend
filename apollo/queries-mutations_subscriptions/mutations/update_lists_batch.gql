mutation update_lists_batch($filter: lists_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [update_lists_input!]){
    update_lists_batch(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        sort
        user_created
        date_created
        user_updated
        date_updated
        name
        description
        type
        isPublic
    }
}