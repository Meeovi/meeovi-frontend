mutation update_collections_batch($filter: collections_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [update_collections_input!]){
    update_collections_batch(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        created_at
        name
        description
        type
    }
}