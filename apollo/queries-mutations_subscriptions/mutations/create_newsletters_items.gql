mutation create_newsletters_items($filter: newsletters_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [create_newsletters_input!]){
    create_newsletters_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        email
        created_at
        optin
        name
        subject
        content
    }
}