mutation create_brands_items($filter: brands_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [create_brands_input!]){
    create_brands_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        created_at
        code
        name
        description
        image
    }
}