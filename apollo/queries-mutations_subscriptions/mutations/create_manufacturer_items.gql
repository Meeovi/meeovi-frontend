mutation create_manufacturer_items($filter: manufacturer_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [create_manufacturer_input!]){
    create_manufacturer_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        created_at
        code
        name
        description
        isPublic
    }
}