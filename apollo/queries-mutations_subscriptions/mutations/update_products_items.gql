mutation update_products_items($filter: products_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $ids: [ID]!, $data: update_products_input!){
    update_products_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, ids: $ids, data: $data){
        id
        sku
        name
        tax_class
        stock_status
        weight
        created_at
        height
        content
        part_number
        format
        type
        visibility
        price
        size
        rating
        like
        stock
    }
}