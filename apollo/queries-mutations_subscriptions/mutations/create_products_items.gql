mutation create_products_items($filter: products_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [create_products_input!]){
    create_products_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        sku
        name
        tax_class
        stock_status
        weight
        created_at
        height
        content
        part_number
        format
        type
        visibility
        price
        size
        rating
        like
        stock
    }
}