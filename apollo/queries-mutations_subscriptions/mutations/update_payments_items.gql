mutation update_payments_items($filter: payments_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $ids: [ID]!, $data: update_payments_input!){
    update_payments_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, ids: $ids, data: $data){
        id
        status
        payment_method
        amount
        transaction_id
    }
}