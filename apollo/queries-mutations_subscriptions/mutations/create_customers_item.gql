mutation create_customers_item($data: create_customers_input!){
    create_customers_item(data: $data){
        id
        name_prefix
        first_name
        middle_name
        last_name
        email
        phone
        zipcode
        name_suffix
        tax_vat_number
        description
        username
        password
        payment
        dateofbirth
        gender
        type
        created_at
    }
}