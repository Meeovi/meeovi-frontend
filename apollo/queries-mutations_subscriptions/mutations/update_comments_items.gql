mutation update_comments_items($filter: comments_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $ids: [ID]!, $data: update_comments_input!){
    update_comments_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, ids: $ids, data: $data){
        id
        response
        name
        created_at
        updated_at
        helpful
        feedback
    }
}