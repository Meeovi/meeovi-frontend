mutation update_brands_items($filter: brands_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $ids: [ID]!, $data: update_brands_input!){
    update_brands_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, ids: $ids, data: $data){
        id
        created_at
        code
        name
        description
        image
    }
}