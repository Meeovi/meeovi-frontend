mutation update_shops_items($filter: shops_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $ids: [ID]!, $data: update_shops_input!){
    update_shops_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, ids: $ids, data: $data){
        id
        status
        sort
        user_created
        date_created
        user_updated
        date_updated
        name
        content
        website
        type
        address
    }
}