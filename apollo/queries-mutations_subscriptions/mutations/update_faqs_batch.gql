mutation update_faqs_batch($filter: faqs_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [update_faqs_input!]){
    update_faqs_batch(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        status
        sort
        user_created
        user_updated
        question
        answer
    }
}