mutation update_returns_items($filter: returns_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $ids: [ID]!, $data: update_returns_input!){
    update_returns_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, ids: $ids, data: $data){
        id
        status
        date_created
        date_updated
        return_number
        reason
    }
}