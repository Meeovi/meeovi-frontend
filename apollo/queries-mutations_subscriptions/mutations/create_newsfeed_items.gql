mutation create_newsfeed_items($filter: newsfeed_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [create_newsfeed_input!]){
    create_newsfeed_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        status
        sort
        user_created
        date_created
        user_updated
        date_updated
        post
    }
}