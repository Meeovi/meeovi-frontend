mutation update_messages_batch($filter: messages_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [update_messages_input!]){
    update_messages_batch(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        sort
        user_created
        date_created
        user_updated
        date_updated
        title
        content
    }
}