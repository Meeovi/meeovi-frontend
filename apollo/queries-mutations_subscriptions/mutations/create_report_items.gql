mutation create_report_items($filter: report_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [create_report_input!]){
    create_report_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        sort
        user_created
        date_created
        user_updated
        date_updated
        title
        content
    }
}