mutation update_customers_item($id: ID!, $data: update_customers_input!){
    update_customers_item(id: $id, data: $data){
        id
        name_prefix
        first_name
        middle_name
        last_name
        email
        phone
        zipcode
        name_suffix
        tax_vat_number
        description
        username
        password
        payment
        dateofbirth
        gender
        type
        created_at
    }
}