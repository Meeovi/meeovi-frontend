mutation update_comments_batch($filter: comments_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [update_comments_input!]){
    update_comments_batch(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        response
        name
        created_at
        updated_at
        helpful
        feedback
    }
}