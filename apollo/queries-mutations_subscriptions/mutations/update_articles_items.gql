mutation update_articles_items($filter: articles_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $ids: [ID]!, $data: update_articles_input!){
    update_articles_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, ids: $ids, data: $data){
        id
        name
        excerpt
        content
        created_at
        type
        isPublic
        stamp
    }
}