mutation create_coupons_items($filter: coupons_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [create_coupons_input!]){
    create_coupons_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        name
        excerpt
        code
        discount_percent
        valid_from
        valid_until
        max_redemptions
    }
}