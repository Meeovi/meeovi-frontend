mutation update_manufacturer_items($filter: manufacturer_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $ids: [ID]!, $data: update_manufacturer_input!){
    update_manufacturer_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, ids: $ids, data: $data){
        id
        created_at
        code
        name
        description
        isPublic
    }
}