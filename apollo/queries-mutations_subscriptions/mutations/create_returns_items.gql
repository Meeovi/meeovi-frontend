mutation create_returns_items($filter: returns_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $data: [create_returns_input!]){
    create_returns_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, data: $data){
        id
        status
        date_created
        date_updated
        return_number
        reason
    }
}