mutation update_reactions_items($filter: reactions_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $ids: [ID]!, $data: update_reactions_input!){
    update_reactions_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, ids: $ids, data: $data){
        id
        date_created
        date_updated
        reaction_type
    }
}