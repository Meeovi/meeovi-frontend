mutation update_tags_items($filter: tags_filter, $sort: [String], $limit: Int, $offset: Int, $page: Int, $search: String, $ids: [ID]!, $data: update_tags_input!){
    update_tags_items(filter: $filter, sort: $sort, limit: $limit, offset: $offset, page: $page, search: $search, ids: $ids, data: $data){
        id
        status
        sort
        date_created
        name
        description
    }
}