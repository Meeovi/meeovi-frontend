query activeChannel{
    activeChannel{
        id
        createdAt
        updatedAt
        code
        token
        defaultTaxZone{
            id
            createdAt
            updatedAt
            name
            members{
                id
                createdAt
                updatedAt
                languageCode
                code
                type
                name
                enabled
                parentId
            }
            customFields
        }
        defaultShippingZone{
            id
            createdAt
            updatedAt
            name
            members{
                id
                createdAt
                updatedAt
                languageCode
                code
                type
                name
                enabled
                parentId
            }
            customFields
        }
        defaultLanguageCode
        availableLanguageCodes
        defaultCurrencyCode
        availableCurrencyCodes
        trackInventory
        outOfStockThreshold
        pricesIncludeTax
        seller{
            id
            createdAt
            updatedAt
            name
            customFields
        }
        customFields
    }
}