query facets($options: FacetValueListOptions, $options1: FacetListOptions){
    facets(options: $options1){
        items{
            id
            createdAt
            updatedAt
            languageCode
            name
            code
            values{
                id
                createdAt
                updatedAt
                languageCode
                facetId
                name
                code
                customFields
            }
            valueList(options: $options){
                totalItems
            }
            translations{
                id
                createdAt
                updatedAt
                languageCode
                name
            }
            customFields
        }
        totalItems
    }
}