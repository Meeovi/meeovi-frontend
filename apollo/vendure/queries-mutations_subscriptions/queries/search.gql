query search($input: SearchInput!){
    search(input: $input){
        items{
            sku
            slug
            productId
            productName
            productAsset{
                id
                preview
            }
            productVariantId
            productVariantName
            productVariantAsset{
                id
                preview
            }
            price{
                __typename
                ... on PriceRange {
                    min
                    max
                }
                ... on SinglePrice {
                    value
                }
            }
            priceWithTax{
                __typename
                ... on PriceRange {
                    min
                    max
                }
                ... on SinglePrice {
                    value
                }
            }
            currencyCode
            description
            facetIds
            facetValueIds
            collectionIds
            score
            inStock
        }
        totalItems
        facetValues{
            facetValue{
                id
                createdAt
                updatedAt
                languageCode
                facetId
                name
                code
                customFields
            }
            count
        }
        collections{
            collection{
                id
                createdAt
                updatedAt
                languageCode
                name
                slug
                position
                description
                parentId
                customFields
            }
            count
        }
    }
}