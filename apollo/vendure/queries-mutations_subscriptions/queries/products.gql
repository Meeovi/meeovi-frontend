query products{
    products{
        items{
            id
            createdAt
            updatedAt
            languageCode
            name
            slug
            description
            featuredAsset{
                id
                createdAt
                updatedAt
                name
                type
                fileSize
                mimeType
                width
                height
                source
                preview
                customFields
            }
            assets{
                id
                createdAt
                updatedAt
                name
                type
                fileSize
                mimeType
                width
                height
                source
                preview
                customFields
            }
            variants{
                id
                productId
                createdAt
                updatedAt
                languageCode
                sku
                name
                price
                currencyCode
                priceWithTax
                stockLevel
                customFields
            }
            variantList{
                totalItems
            }
            optionGroups{
                id
                createdAt
                updatedAt
                languageCode
                code
                name
                customFields
            }
            facetValues{
                id
                createdAt
                updatedAt
                languageCode
                facetId
                name
                code
                customFields
            }
            translations{
                id
                createdAt
                updatedAt
                languageCode
                name
                slug
                description
            }
            collections{
                id
                createdAt
                updatedAt
                languageCode
                name
                slug
                position
                description
                parentId
                customFields
            }
            customFields
        }
        totalItems
    }
}