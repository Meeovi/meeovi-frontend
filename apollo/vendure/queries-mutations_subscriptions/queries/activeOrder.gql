query activeOrder($options: OrderListOptions, $options1: HistoryEntryListOptions){
    activeOrder{
        id
        createdAt
        updatedAt
        type
        orderPlacedAt
        code
        state
        active
        customer{
            id
            createdAt
            updatedAt
            title
            firstName
            lastName
            phoneNumber
            emailAddress
            addresses{
                id
                createdAt
                updatedAt
                fullName
                company
                streetLine1
                streetLine2
                city
                province
                postalCode
                phoneNumber
                defaultShippingAddress
                defaultBillingAddress
                customFields
            }
            orders(options: $options){
                totalItems
            }
            user{
                id
                createdAt
                updatedAt
                identifier
                verified
                lastLogin
                customFields
            }
            customFields
        }
        shippingAddress{
            fullName
            company
            streetLine1
            streetLine2
            city
            province
            postalCode
            country
            countryCode
            phoneNumber
            customFields
        }
        billingAddress{
            fullName
            company
            streetLine1
            streetLine2
            city
            province
            postalCode
            country
            countryCode
            phoneNumber
            customFields
        }
        lines{
            id
            createdAt
            updatedAt
            productVariant{
                id
                productId
                createdAt
                updatedAt
                languageCode
                sku
                name
                price
                currencyCode
                priceWithTax
                stockLevel
                customFields
            }
            featuredAsset{
                id
                createdAt
                updatedAt
                name
                type
                fileSize
                mimeType
                width
                height
                source
                preview
                customFields
            }
            unitPrice
            unitPriceWithTax
            unitPriceChangeSinceAdded
            unitPriceWithTaxChangeSinceAdded
            discountedUnitPrice
            discountedUnitPriceWithTax
            proratedUnitPrice
            proratedUnitPriceWithTax
            quantity
            orderPlacedQuantity
            taxRate
            linePrice
            linePriceWithTax
            discountedLinePrice
            discountedLinePriceWithTax
            proratedLinePrice
            proratedLinePriceWithTax
            lineTax
            discounts{
                adjustmentSource
                type
                description
                amount
                amountWithTax
            }
            taxLines{
                description
                taxRate
            }
            order{
                id
                createdAt
                updatedAt
                type
                orderPlacedAt
                code
                state
                active
                couponCodes
                totalQuantity
                subTotal
                subTotalWithTax
                currencyCode
                shipping
                shippingWithTax
                total
                totalWithTax
                customFields
            }
            fulfillmentLines{
                orderLineId
                quantity
                fulfillmentId
            }
            customFields
        }
        surcharges{
            id
            createdAt
            updatedAt
            description
            sku
            taxLines{
                description
                taxRate
            }
            price
            priceWithTax
            taxRate
        }
        discounts{
            adjustmentSource
            type
            description
            amount
            amountWithTax
        }
        couponCodes
        promotions{
            id
            createdAt
            updatedAt
            startsAt
            endsAt
            couponCode
            perCustomerUsageLimit
            usageLimit
            name
            description
            enabled
            conditions{
                code
            }
            actions{
                code
            }
            translations{
                id
                createdAt
                updatedAt
                languageCode
                name
                description
            }
            customFields
        }
        payments{
            id
            createdAt
            updatedAt
            method
            amount
            state
            transactionId
            errorMessage
            refunds{
                id
                createdAt
                updatedAt
                items
                shipping
                adjustment
                total
                method
                state
                transactionId
                reason
                paymentId
                metadata
            }
            metadata
        }
        fulfillments{
            id
            createdAt
            updatedAt
            lines{
                orderLineId
                quantity
                fulfillmentId
            }
            state
            method
            trackingCode
            customFields
        }
        totalQuantity
        subTotal
        subTotalWithTax
        currencyCode
        shippingLines{
            id
            shippingMethod{
                id
                createdAt
                updatedAt
                languageCode
                code
                name
                description
                fulfillmentHandlerCode
                customFields
            }
            price
            priceWithTax
            discountedPrice
            discountedPriceWithTax
            discounts{
                adjustmentSource
                type
                description
                amount
                amountWithTax
            }
        }
        shipping
        shippingWithTax
        total
        totalWithTax
        taxSummary{
            description
            taxRate
            taxBase
            taxTotal
        }
        history(options: $options1){
            items{
                id
                createdAt
                updatedAt
                type
                data
            }
            totalItems
        }
        customFields
    }
}