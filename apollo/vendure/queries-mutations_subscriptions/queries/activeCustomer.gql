query activeCustomer($options: OrderListOptions){
    activeCustomer{
        id
        createdAt
        updatedAt
        title
        firstName
        lastName
        phoneNumber
        emailAddress
        addresses{
            id
            createdAt
            updatedAt
            fullName
            company
            streetLine1
            streetLine2
            city
            province
            postalCode
            country{
                id
                createdAt
                updatedAt
                languageCode
                code
                type
                name
                enabled
                parentId
                customFields
            }
            phoneNumber
            defaultShippingAddress
            defaultBillingAddress
            customFields
        }
        orders(options: $options){
            items{
                id
                createdAt
                updatedAt
                type
                orderPlacedAt
                code
                state
                active
                couponCodes
                totalQuantity
                subTotal
                subTotalWithTax
                currencyCode
                shipping
                shippingWithTax
                total
                totalWithTax
                customFields
            }
            totalItems
        }
        user{
            id
            createdAt
            updatedAt
            identifier
            verified
            roles{
                id
                createdAt
                updatedAt
                code
                description
                permissions
            }
            lastLogin
            authenticationMethods{
                id
                createdAt
                updatedAt
                strategy
            }
            customFields
        }
        customFields
    }
}