query facet($options: FacetValueListOptions, $id: ID!){
    facet(id: $id){
        id
        createdAt
        updatedAt
        languageCode
        name
        code
        values{
            id
            createdAt
            updatedAt
            languageCode
            facet{
                id
                createdAt
                updatedAt
                languageCode
                name
                code
                customFields
            }
            facetId
            name
            code
            translations{
                id
                createdAt
                updatedAt
                languageCode
                name
            }
            customFields
        }
        valueList(options: $options){
            items{
                id
                createdAt
                updatedAt
                languageCode
                facetId
                name
                code
                customFields
            }
            totalItems
        }
        translations{
            id
            createdAt
            updatedAt
            languageCode
            name
        }
        customFields
    }
}