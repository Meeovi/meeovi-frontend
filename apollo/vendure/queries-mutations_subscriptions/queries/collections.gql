query collections($options: ProductVariantListOptions, $options1: CollectionListOptions){
    collections(options: $options1){
        items{
            id
            createdAt
            updatedAt
            languageCode
            name
            slug
            breadcrumbs{
                id
                name
                slug
            }
            position
            description
            featuredAsset{
                id
                createdAt
                updatedAt
                name
                type
                fileSize
                mimeType
                width
                height
                source
                preview
                customFields
            }
            assets{
                id
                createdAt
                updatedAt
                name
                type
                fileSize
                mimeType
                width
                height
                source
                preview
                customFields
            }
            parent{
                id
                createdAt
                updatedAt
                languageCode
                name
                slug
                position
                description
                parentId
                customFields
            }
            parentId
            children{
                id
                createdAt
                updatedAt
                languageCode
                name
                slug
                position
                description
                parentId
                customFields
            }
            filters{
                code
            }
            translations{
                id
                createdAt
                updatedAt
                languageCode
                name
                slug
                description
            }
            productVariants(options: $options){
                totalItems
            }
            customFields
        }
        totalItems
    }
}